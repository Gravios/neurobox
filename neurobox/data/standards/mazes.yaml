description: 'Standard mazes recognised by neurobox. Ported from MTAConfiguration.m::MTAMazes.

  `shape` is one of: circle, rectangle, square, line, W. Extents are [min, max] per axis in millimetres. `visual_extent` defines the bounding region for plotting;
  `computational_extent` defines the spatial domain for analyses.'
mazes:
- code: cof
  shape: circle
  visual_extent_xyz_mm:
  - [-500.0, 500.0]
  - [-500.0, 500.0]
  - [0.0, 300.0]
  computational_extent_xyz_mm:
  - [-500.0, 500.0]
  - [-500.0, 500.0]
  - [0.0, 360.0]
